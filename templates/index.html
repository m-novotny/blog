{% extends "base.html" %}

{% block title %}{{ config.title }} — {{ config.description }}{% endblock %}

{% block content %}
<section class="intro">
    <p>{{ config.description }}</p>
</section>

<section class="posts">
    <h2>Posts</h2>
    <ul>
        {% for page in section.pages %}
        <li>
            <a href="{{ page.path }}">{{ page.title }}</a>
            <time>{{ page.date }}</time>
        </li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
